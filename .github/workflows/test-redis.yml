name: Test Redis

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  universal-reachable:
    name: Test Redis (Universal, Reachable)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.6.2
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Patch action.yml
        run: |
          sed -i 's|image:\s.*|image: Dockerfile|g' action.yml

      - name: Wait for Redis
        uses: ./
        with:
          type: redis
          host: redis
          port: 6379
          timeout: 300

  universal-timeout:
    name: Test Redis (Universal, Timeout)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Patch action.yml
        run: |
          sed -i 's|image:\s.*|image: Dockerfile|g' action.yml

      - name: Wait for Redis
        id: wait-for-redis
        uses: ./
        continue-on-error: true
        with:
          type: redis
          host: redis
          port: 6379
          timeout: 30

      - name: Fail if wait succeeded unexpectedly
        if: steps.wait-for-redis.outcome != 'failure'
        run: exit 1

  dedicated-reachable:
    name: Test Redis (Dedicated, Reachable)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.6.2
        ports:
          - 6379:6379
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Wait for Redis
        uses: ./redis
        with:
          host: localhost
          port: 6379
          timeout: 300

  dedicated-timeout:
    name: Test Redis (Dedicated, Timeout)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Wait for Redis
        id: wait-for-redis
        uses: ./redis
        continue-on-error: true
        with:
          host: localhost
          port: 6379
          timeout: 30

      - name: Fail if wait succeeded unexpectedly
        if: steps.wait-for-redis.outcome != 'failure'
        run: exit 1
