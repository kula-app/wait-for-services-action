name: Test Android Emulator

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Android Emulator
    runs-on: ubuntu-latest
    services:
      android-emulator:
        image: mingc/android-build-box:1.29.0
        ports:
          - 5555:5555
        options: >-
          --device /dev/kvm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create Android Virtual Device
        run: |
          echo no | avdmanager create avd --name test --package "system-images;android-30;google_apis;x86_64" --force

      - name: Start Android Emulator in Background
        run: |
          echo "Starting Android Emulator..."
          emulator -avd test -no-audio -no-window -no-boot-anim -gpu swiftshader_indirect -accel on -memory 2048 -writable-system -port 5555 -verbose &

      - name: Wait for Android Emulator
        uses: ./
        with:
          type: android-emulator
          host: android-emulator
          port: 5555
          timeout: 600

  test-timeout:
    name: Test Android Emulator - Timeout
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Android Emulator
        id: wait-for-android-emulator
        uses: ./
        continue-on-error: true
        with:
          type: android-emulator
          host: android-emulator
          port: 5555
          timeout: 30

      - name: Fail if wait succeeded unexpectedly
        if: steps.wait-for-android-emulator.outcome != 'failure'
        run: exit 1
