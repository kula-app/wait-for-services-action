name: Test MongoDB

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test MongoDB (Docker)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0.15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Patch action.yml
        run: |
          sed -i 's|image:\s.*|image: Dockerfile|g' action.yml

      - name: Wait for MongoDB
        uses: ./
        with:
          type: mongodb
          host: mongodb
          port: 27017
          timeout: 300

  test-sub-action:
    name: Test MongoDB (Node)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0.15
        ports:
          - 27017:27017
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Wait for MongoDB
        uses: ./mongodb
        with:
          host: localhost
          port: 27017
          timeout: 300

  test-timeout:
    name: Test MongoDB - Timeout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Patch action.yml
        run: |
          sed -i 's|image:\s.*|image: Dockerfile|g' action.yml

      - name: Wait for MongoDB
        id: wait-for-mongodb
        uses: ./
        continue-on-error: true
        with:
          type: mongodb
          host: mongodb
          port: 27017
          timeout: 30

      - name: Fail if wait succeeded unexpectedly
        if: steps.wait-for-mongodb.outcome != 'failure'
        run: exit 1
